# Reusable image builder. No checks, no release: orchestrators invoke this
# via workflow_call after gating on ci.yml + semantic-release.
#
# Ships TWO images per release:
#   - chrisleekr/github-app-playground:<tag>-orchestrator  (lean, webhook server)
#   - chrisleekr/github-app-playground:<tag>-daemon        (rich, Claude worker)
# Orchestrator additionally publishes a bare `<tag>` alias so existing
# consumers that pull `chrisleekr/github-app-playground:<version>` keep working.
# `:latest` is published on prod releases only, on the orchestrator variant.
#
# Multi-platform via the documented split-and-merge pattern:
#   https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
# - amd64 builds on ubuntu-24.04 (x86_64)
# - arm64 builds on ubuntu-24.04-arm (free for public repos:
#     https://github.blog/changelog/2025-01-16-linux-arm64-hosted-runners-now-available-for-free-in-public-repositories-public-preview/)
# - Runners are explicitly pinned (not `ubuntu-latest`) so the rolling alias
#   can't silently flip to 26.04 and break the build.
# - Each (arch, variant) leg pushes by digest only; merge job assembles the
#   manifest list per variant.
# - GHA cache is scoped per (arch, variant) so the four legs don't trample
#   each other.
#
# Trivy scans each (arch, variant) manifest tag separately with the existing
# time-boxed .trivyignore.yaml allowlist.
#
# Defense-in-depth: every workflow input that flows into a `run:` block is
# passed through `env:` first to prevent script-injection at YAML-render time.
name: Docker Build & Push

on:
  workflow_call:
    inputs:
      tag-name:
        description: "Git tag to build (e.g., v1.0.0 or v1.0.0-dev-abc1234.1)"
        required: true
        type: string
      is-dev-release:
        description: "Whether this is a dev/pre-release (controls `latest` tag)"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag-name:
        description: "Git tag to build (must already exist)"
        required: true
        type: string
      is-dev-release:
        description: "Whether this is a dev/pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write
  # Read-only attestations grant lets the `scan` job verify SLSA / SBOM
  # attestations via `gh attestation verify` before scanning. The `merge`
  # job overrides locally to add the `id-token: write` + `attestations: write`
  # scopes required to publish Sigstore-signed attestations.
  # Note: As SBOM file size is over 16MB, temporary disable SBOM attestations.
  # attestations: read

env:
  IMAGE_NAME: chrisleekr/github-app-playground

jobs:
  build:
    name: Build (${{ matrix.variant }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              platform: linux/amd64,
              runner: ubuntu-24.04,
              arch: amd64,
              variant: orchestrator,
              dockerfile: Dockerfile.orchestrator,
            }
          - {
              platform: linux/arm64,
              runner: ubuntu-24.04-arm,
              arch: arm64,
              variant: orchestrator,
              dockerfile: Dockerfile.orchestrator,
            }
          - {
              platform: linux/amd64,
              runner: ubuntu-24.04,
              arch: amd64,
              variant: daemon,
              dockerfile: Dockerfile.daemon,
            }
          - {
              platform: linux/arm64,
              runner: ubuntu-24.04-arm,
              arch: arm64,
              variant: daemon,
              dockerfile: Dockerfile.daemon,
            }
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout specific tag
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          # Prod release: v1.2.3
          # Dev pre-release: v1.2.3-<sanitized-branch>.N: branch name is
          # alphanumerics+hyphens (release.config.mjs strips slashes), and N
          # is the prerelease counter semantic-release auto-increments.
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-[a-zA-Z][a-zA-Z0-9-]*\.[0-9]+)?$ ]]; then
            echo "ERROR: tag-name input does not match the expected format." >&2
            exit 1
          fi
          echo "Checking out tag: $TAG_NAME"
          git checkout "$TAG_NAME"
          CURRENT_TAG=$(git describe --exact-match --tags HEAD 2>/dev/null || echo "no-tag")
          if [ "$CURRENT_TAG" != "$TAG_NAME" ]; then
            echo "ERROR: Failed to checkout tag $TAG_NAME (currently on: $CURRENT_TAG)"
            exit 1
          fi

      - name: Extract build metadata
        id: meta
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          PACKAGE_VERSION="${TAG_NAME#v}"
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "git_hash=$GIT_HASH" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: production
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME
            }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}-${{ matrix.variant }}
          # SLSA v1 provenance (full BuildKit invocation) + SPDX SBOM.
          # build-push-action defaults `provenance` to false when
          # `push-by-digest=true` (the leaf-attestation problem), so set both
          # explicitly. BuildKit emits an attestation-manifest descriptor
          # alongside each leaf image; the merge step's index digest
          # references both, so `imagetools create` carries the descriptors
          # into the published manifest list automatically.
          # https://docs.docker.com/build/ci/github-actions/multi-platform/
          # Note: As SBOM file size is over 16MB, temporary disable SBOM attestations.
          # provenance: mode=max
          # sbom: true
          build-args: |
            PACKAGE_VERSION=${{ steps.meta.outputs.package_version }}
            GIT_HASH=${{ steps.meta.outputs.git_hash }}
            NODE_ENV=production

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest (${{ matrix.variant }})
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    # Least-privilege override: this job is the only one that publishes
    # Sigstore-signed attestations, so it gets `id-token: write` (Sigstore
    # OIDC) + `attestations: write` (GitHub Attestations API). Build / scan
    # keep the top-level read-only set.
    # Note: As SBOM file size is over 16MB, temporary disable SBOM attestations.
    # permissions:
    #   contents: read
    #   id-token: write
    #   attestations: write
    env:
      REGISTRY: docker.io
    strategy:
      fail-fast: false
      matrix:
        variant: [orchestrator, daemon]
    steps:
      - name: Compute tag
        id: tag
        env:
          TAG_NAME: ${{ inputs.tag-name }}
          VARIANT: ${{ matrix.variant }}
        run: |
          PACKAGE_VERSION="${TAG_NAME#v}"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "variant_tag=${PACKAGE_VERSION}-${VARIANT}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.variant_tag }}
            type=raw,value=${{ steps.tag.outputs.version }},enable=${{ matrix.variant == 'orchestrator' }}
            type=raw,value=latest,enable=${{ matrix.variant == 'orchestrator' && inputs.is-dev-release == false }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          # The leaf digests below are *index* digests emitted by BuildKit
          # when `provenance: mode=max` + `sbom: true` are set on the build
          # step: each index references both the per-arch image manifest
          # AND its `vnd.docker.reference.type=attestation-manifest`
          # sibling. `imagetools create` walks each index and copies all
          # descriptors into the merged list, so SBOM + provenance survive
          # the merge without any extra CLI plumbing here.
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)
      # Note: As SBOM file size is over 16MB, temporary disable SBOM attestations.
      # - name: Inspect merged image and capture digest
      #   id: inspect
      #   env:
      #     IMAGE: ${{ env.IMAGE_NAME }}
      #     TAG: ${{ steps.tag.outputs.variant_tag }}
      #   run: |
      #     docker buildx imagetools inspect "${IMAGE}:${TAG}"
      #     DIGEST=$(docker buildx imagetools inspect "${IMAGE}:${TAG}" \
      #       --format '{{ .Manifest.Digest }}')
      #     if ! [[ "$DIGEST" =~ ^sha256:[0-9a-f]{64}$ ]]; then
      #       echo "ERROR: failed to parse merged manifest digest: $DIGEST" >&2
      #       exit 1
      #     fi
      #     echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"

      # - name: Generate CycloneDX SBOM for merged image
      #   uses: anchore/sbom-action@v0
      #   with:
      #     image: ${{ env.IMAGE_NAME }}@${{ steps.inspect.outputs.digest }}
      #     format: cyclonedx-json
      #     output-file: "sbom-${{ matrix.variant }}.cyclonedx.json"
      #     upload-artifact: false
      #     upload-release-assets: false
      #     config: .syft.yaml

      # - name: Attest build provenance
      #   uses: actions/attest@v4
      #   with:
      #     subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      #     subject-digest: ${{ steps.inspect.outputs.digest }}
      #     push-to-registry: true

      # - name: Attest SBOM
      #   uses: actions/attest@v4
      #   with:
      #     subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      #     subject-digest: ${{ steps.inspect.outputs.digest }}
      #     sbom-path: "sbom-${{ matrix.variant }}.cyclonedx.json"
      #     push-to-registry: true

  scan:
    name: Trivy scan (${{ matrix.variant }} / ${{ matrix.arch }})
    needs: merge
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        variant: [orchestrator, daemon]
    steps:
      - name: Checkout (for .trivyignore.yaml)
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tag
        id: imgtag
        env:
          TAG_NAME: ${{ inputs.tag-name }}
          VARIANT: ${{ matrix.variant }}
        run: |
          PACKAGE_VERSION="${TAG_NAME#v}"
          echo "tag=${PACKAGE_VERSION}-${VARIANT}" >> "$GITHUB_OUTPUT"

      # Regression gate: fail the workflow if the published image is missing
      # its Sigstore-signed SLSA provenance + SBOM attestations. Catches
      # silent drops from future refactors of the build / merge jobs.
      # Note: As SBOM file size is over 16MB, temporary disable SBOM attestations.
      # - name: Verify image attestations
      #   env:
      #     GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      #     IMAGE_REF: oci://${{ env.IMAGE_NAME }}:${{ steps.imgtag.outputs.tag }}
      #     REPO: ${{ github.repository }}
      #   run: |
      #     # Two separate calls: each fails if the requested predicate type is
      #     # absent, so this catches a regression that drops EITHER attestation.
      #     gh attestation verify "$IMAGE_REF" --repo "$REPO" \
      #       --predicate-type https://slsa.dev/provenance/v1
      #     gh attestation verify "$IMAGE_REF" --repo "$REPO" \
      #       --predicate-type https://cyclonedx.org/bom

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          TRIVY_PLATFORM: "linux/${{ matrix.arch }}"
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ steps.imgtag.outputs.tag }}"
          format: sarif
          output: "trivy-results-${{ matrix.variant }}-${{ matrix.arch }}.sarif"
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          ignore-unfixed: true
          # Daemon image ships a full toolchain (nvm, Docker CLI, apt, etc.) so
          # CVEs are a permanent fact of life: scan it for visibility in the
          # GitHub Security tab but don't block CI. Orchestrator still gates.
          exit-code: ${{ matrix.variant == 'daemon' && '0' || '1' }}
          trivyignores: .trivyignore.yaml

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results-${{ matrix.variant }}-${{ matrix.arch }}.sarif"
          category: "trivy-container-scan-${{ matrix.variant }}-${{ matrix.arch }}"
