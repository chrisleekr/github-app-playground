# Reusable image builder. No checks, no release — orchestrators invoke this
# via workflow_call after gating on ci.yml + semantic-release.
#
# Multi-platform via the documented split-and-merge pattern:
#   https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
# - amd64 builds on ubuntu-latest (x86_64)
# - arm64 builds on ubuntu-24.04-arm (free for public repos:
#     https://github.blog/changelog/2025-01-16-linux-arm64-hosted-runners-now-available-for-free-in-public-repositories-public-preview/)
# - Each platform pushes by digest only; merge job assembles the manifest list.
# - GHA cache is scoped per arch so amd64 and arm64 don't trample each other.
#
# Trivy scans the assembled manifest tag with the existing time-boxed
# .trivyignore.yaml allowlist.
#
# Defense-in-depth: every workflow input that flows into a `run:` block is
# passed through `env:` first to prevent script-injection at YAML-render time.
name: Docker Build & Push

on:
  workflow_call:
    inputs:
      tag-name:
        description: "Git tag to build (e.g., v1.0.0 or v1.0.0-dev-abc1234.1)"
        required: true
        type: string
      is-dev-release:
        description: "Whether this is a dev/pre-release (controls `latest` tag)"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag-name:
        description: "Git tag to build (must already exist)"
        required: true
        type: string
      is-dev-release:
        description: "Whether this is a dev/pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write # Required: upload Trivy SARIF to GitHub Security tab

env:
  IMAGE_NAME: chrisleekr/github-app-playground

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0 # Need tags

      - name: Checkout specific tag
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          echo "Checking out tag: $TAG_NAME"
          git checkout "$TAG_NAME"
          CURRENT_TAG=$(git describe --exact-match --tags HEAD 2>/dev/null || echo "no-tag")
          if [ "$CURRENT_TAG" != "$TAG_NAME" ]; then
            echo "ERROR: Failed to checkout tag $TAG_NAME (currently on: $CURRENT_TAG)"
            exit 1
          fi

      - name: Extract build metadata
        id: meta
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          PACKAGE_VERSION="${TAG_NAME#v}"
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "git_hash=$GIT_HASH" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          target: production
          platforms: ${{ matrix.platform }}
          # Push without a tag, by digest only — the merge job tags it.
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}
          build-args: |
            PACKAGE_VERSION=${{ steps.meta.outputs.package_version }}
            GIT_HASH=${{ steps.meta.outputs.git_hash }}
            NODE_ENV=production

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Compute tag
        id: tag
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          PACKAGE_VERSION="${TAG_NAME#v}"
          echo "tag=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.tag }}
            type=raw,value=latest,enable=${{ inputs.is-dev-release == false }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
        # SC2046 intentional: both $(...) substitutions must expand as
        # space-separated args to `imagetools create` (one -t per tag, one
        # image ref per digest). Quoting would collapse them into a single
        # arg and break the command.
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect image
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          TAG: ${{ steps.tag.outputs.tag }}
        run: docker buildx imagetools inspect "${IMAGE}:${TAG}"

  scan:
    name: Trivy scan
    needs: merge
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout (for .trivyignore.yaml)
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ needs.merge.outputs.tag }}"
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore.yaml

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-scan
