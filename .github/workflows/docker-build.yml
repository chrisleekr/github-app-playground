# Reusable image builder. No checks, no release — orchestrators invoke this
# via workflow_call after gating on ci.yml + semantic-release.
#
# Ships TWO images per release:
#   - chrisleekr/github-app-playground:<tag>-orchestrator  (lean, webhook server)
#   - chrisleekr/github-app-playground:<tag>-daemon        (rich, Claude worker)
# Orchestrator additionally publishes a bare `<tag>` alias so existing
# consumers that pull `chrisleekr/github-app-playground:<version>` keep working.
# `:latest` is published on prod releases only, on the orchestrator variant.
#
# Multi-platform via the documented split-and-merge pattern:
#   https://docs.docker.com/build/ci/github-actions/multi-platform/#distribute-build-across-multiple-runners
# - amd64 builds on ubuntu-24.04 (x86_64)
# - arm64 builds on ubuntu-24.04-arm (free for public repos:
#     https://github.blog/changelog/2025-01-16-linux-arm64-hosted-runners-now-available-for-free-in-public-repositories-public-preview/)
# - Runners are explicitly pinned (not `ubuntu-latest`) so the rolling alias
#   can't silently flip to 26.04 and break the build.
# - Each (arch, variant) leg pushes by digest only; merge job assembles the
#   manifest list per variant.
# - GHA cache is scoped per (arch, variant) so the four legs don't trample
#   each other.
#
# Trivy scans each (arch, variant) manifest tag separately with the existing
# time-boxed .trivyignore.yaml allowlist.
#
# Defense-in-depth: every workflow input that flows into a `run:` block is
# passed through `env:` first to prevent script-injection at YAML-render time.
name: Docker Build & Push

on:
  workflow_call:
    inputs:
      tag-name:
        description: "Git tag to build (e.g., v1.0.0 or v1.0.0-dev-abc1234.1)"
        required: true
        type: string
      is-dev-release:
        description: "Whether this is a dev/pre-release (controls `latest` tag)"
        required: false
        type: boolean
        default: false
  workflow_dispatch:
    inputs:
      tag-name:
        description: "Git tag to build (must already exist)"
        required: true
        type: string
      is-dev-release:
        description: "Whether this is a dev/pre-release"
        required: false
        type: boolean
        default: false

permissions:
  contents: read
  security-events: write

env:
  IMAGE_NAME: chrisleekr/github-app-playground

jobs:
  build:
    name: Build (${{ matrix.variant }} / ${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - {
              platform: linux/amd64,
              runner: ubuntu-24.04,
              arch: amd64,
              variant: orchestrator,
              dockerfile: Dockerfile.orchestrator,
            }
          - {
              platform: linux/arm64,
              runner: ubuntu-24.04-arm,
              arch: arm64,
              variant: orchestrator,
              dockerfile: Dockerfile.orchestrator,
            }
          - {
              platform: linux/amd64,
              runner: ubuntu-24.04,
              arch: amd64,
              variant: daemon,
              dockerfile: Dockerfile.daemon,
            }
          - {
              platform: linux/arm64,
              runner: ubuntu-24.04-arm,
              arch: arm64,
              variant: daemon,
              dockerfile: Dockerfile.daemon,
            }
    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Checkout specific tag
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          if ! [[ "$TAG_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+(-dev-[0-9a-f]{7}\.[0-9]+)?$ ]]; then
            echo "ERROR: tag-name input does not match the expected format." >&2
            exit 1
          fi
          echo "Checking out tag: $TAG_NAME"
          git checkout "$TAG_NAME"
          CURRENT_TAG=$(git describe --exact-match --tags HEAD 2>/dev/null || echo "no-tag")
          if [ "$CURRENT_TAG" != "$TAG_NAME" ]; then
            echo "ERROR: Failed to checkout tag $TAG_NAME (currently on: $CURRENT_TAG)"
            exit 1
          fi

      - name: Extract build metadata
        id: meta
        env:
          TAG_NAME: ${{ inputs.tag-name }}
        run: |
          PACKAGE_VERSION="${TAG_NAME#v}"
          GIT_HASH=$(git rev-parse --short HEAD)
          echo "package_version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "git_hash=$GIT_HASH" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          target: production
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.arch }}-${{ matrix.variant }}
          cache-to: type=gha,mode=max,scope=${{ matrix.arch }}-${{ matrix.variant }}
          build-args: |
            PACKAGE_VERSION=${{ steps.meta.outputs.package_version }}
            GIT_HASH=${{ steps.meta.outputs.git_hash }}
            NODE_ENV=production

      - name: Export digest
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          mkdir -p "${RUNNER_TEMP}/digests"
          touch "${RUNNER_TEMP}/digests/${DIGEST#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.variant }}-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    name: Merge manifest (${{ matrix.variant }})
    needs: build
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        variant: [orchestrator, daemon]
    steps:
      - name: Compute tag
        id: tag
        env:
          TAG_NAME: ${{ inputs.tag-name }}
          VARIANT: ${{ matrix.variant }}
        run: |
          PACKAGE_VERSION="${TAG_NAME#v}"
          echo "version=$PACKAGE_VERSION" >> "$GITHUB_OUTPUT"
          echo "variant_tag=${PACKAGE_VERSION}-${VARIANT}" >> "$GITHUB_OUTPUT"

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-${{ matrix.variant }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ steps.tag.outputs.variant_tag }}
            type=raw,value=${{ steps.tag.outputs.version }},enable=${{ matrix.variant == 'orchestrator' }}
            type=raw,value=latest,enable=${{ matrix.variant == 'orchestrator' && inputs.is-dev-release == false }}

      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
        run: |
          # shellcheck disable=SC2046
          docker buildx imagetools create \
            $(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON") \
            $(printf "${IMAGE}@sha256:%s " *)

      - name: Inspect image
        env:
          IMAGE: ${{ env.IMAGE_NAME }}
          TAG: ${{ steps.tag.outputs.variant_tag }}
        run: docker buildx imagetools inspect "${IMAGE}:${TAG}"

  scan:
    name: Trivy scan (${{ matrix.variant }} / ${{ matrix.arch }})
    needs: merge
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        arch: [amd64, arm64]
        variant: [orchestrator, daemon]
    steps:
      - name: Checkout (for .trivyignore.yaml)
        uses: actions/checkout@v6

      - name: Login to Docker Hub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compute image tag
        id: imgtag
        env:
          TAG_NAME: ${{ inputs.tag-name }}
          VARIANT: ${{ matrix.variant }}
        run: |
          PACKAGE_VERSION="${TAG_NAME#v}"
          echo "tag=${PACKAGE_VERSION}-${VARIANT}" >> "$GITHUB_OUTPUT"

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.35.0
        env:
          TRIVY_PLATFORM: "linux/${{ matrix.arch }}"
        with:
          image-ref: "${{ env.IMAGE_NAME }}:${{ steps.imgtag.outputs.tag }}"
          format: sarif
          output: "trivy-results-${{ matrix.variant }}-${{ matrix.arch }}.sarif"
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          ignore-unfixed: true
          exit-code: "1"
          trivyignores: .trivyignore.yaml

      - name: Upload Trivy SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: "trivy-results-${{ matrix.variant }}-${{ matrix.arch }}.sarif"
          category: "trivy-container-scan-${{ matrix.variant }}-${{ matrix.arch }}"
