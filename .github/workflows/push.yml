# This workflow is used when a commit is pushed to the feature branch.
# It follows the following steps:
#   - Push to feature branch → push.yml → semantic-release.yml (is-dev-release: true) → creates tag → calls docker-build.yml.
name: Push

on:
  push:
    # Since the branches must be always up to date, we do not need to run below workflows.
    branches-ignore:
      - "main" # Exclude default branch
      - "v*" # Exclude tags
  workflow_dispatch:

# Cancel previous runs if a new one is triggered
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write # Required for semantic-release (tags, commits, GitHub releases)
  security-events: write # Granted to the downstream docker-build workflow for trivy SARIF upload

env:
  BUN_VERSION: "1.3.8"

jobs:
  lint-and-test:
    name: Lint & Test
    if: "!contains(github.event.head_commit.message, 'skip ci')"
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout source code
        uses: actions/checkout@v6
        with:
          # Full history required so the gitleaks step below can scan all
          # commits via `git log -p`. Default fetch-depth: 1 limits gitleaks
          # to the latest commit and defeats the "scan git history" purpose.
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ env.BUN_VERSION }}

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run typecheck
        run: bun run typecheck

      - name: Run lint
        run: bun run lint

      - name: Run format
        run: bun run format

      - name: Run dependency audit
        run: bun audit

      - name: Scan git history for secrets
        uses: gitleaks/gitleaks-action@v2.3.9
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_CONFIG: .gitleaks.toml
          # Pin the gitleaks binary version explicitly; gitleaks-action@v2.3.9
          # bundles an older gitleaks (8.24.3) whose [[allowlists]] v8 syntax
          # handling has bugs that surface on docs/SETUP.md false positives.
          GITLEAKS_VERSION: "8.30.1"

      - name: Run test
        run: bun run test
      - name: Run build
        run: bun run build

  semantic-release:
    name: Semantic Release - Dev
    needs: lint-and-test
    # Only run semantic-release for branches configured in release.config.dev.mjs
    if: |
      !contains(github.event.head_commit.message, 'skip ci') && (
        startsWith(github.event.head_commit.message, 'feat') ||
        startsWith(github.event.head_commit.message, 'fix') ||
        startsWith(github.event.head_commit.message, 'refactor') ||
        startsWith(github.event.head_commit.message, 'perf') ||
        startsWith(github.event.head_commit.message, 'revert') ||
        startsWith(github.event.head_commit.message, 'bump') ||
        startsWith(github.event.head_commit.message, 'localize')
      )
    uses: ./.github/workflows/semantic-release.yml
    with:
      is-dev-release: true
      skip-checks: true
    secrets: inherit
