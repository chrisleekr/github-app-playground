site_name: GitHub App Playground
site_description: A GitHub App webhook server powered by the Claude Agent SDK.
site_url: https://chrisleekr.github.io/github-app-playground/
repo_url: https://github.com/chrisleekr/github-app-playground
repo_name: chrisleekr/github-app-playground
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: teal
      accent: teal
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.instant.progress
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.select
    - content.code.annotate
    - content.action.edit

plugins:
  - search
  - tags
  - social:
      enabled: !ENV [CI, false]
  - privacy:
      enabled: !ENV [CI, false]

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path:
        - .
        - docs
      check_paths: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true

extra:
  version:
    provider: mike
    alias: true

nav:
  - Home: index.md
  - Setup: SETUP.md
  - Architecture: ARCHITECTURE.md
  - Configuration: CONFIGURATION.md
  - Operator guides:
      - Observability: OBSERVABILITY.md
      - Triage: TRIAGE.md
      - Daemon mode: DAEMON.md
      - Kubernetes: KUBERNETES.md
  - Deployment: DEPLOYMENT.md
  - Extending: EXTENDING.md
  - Contributing: CONTRIBUTING.md
  - Changelog: CHANGELOG.md
  - Tags: tags.md
