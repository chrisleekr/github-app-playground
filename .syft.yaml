# To prevent SBOM bloat from BuildKit's full-evidence mode (which includes the entire build context as source evidence), write a custom Syft config that disables source + package evidence collection. It should reduce SBOM file size under 16777216 bytes.
scope: "squashed"
license:
  content: "none"
file:
  metadata:
    selection: "owned-by-package"
    digests:
      - "sha256"
  content:
    skip-files-above-size: 0
    globs: []
relationships:
  package-file-ownership: false
  package-file-ownership-overlap: false
  exclude-binary-overlap-by-ownership: false
select-catalogers:
  - "-file-metadata"
  - "-file-content"
  - "-file-executable"
